/home/chaos/.config/i3/config:
  append: |
    # bindcode           64 exec --no-startup-id xinput --disable 'USB OPTICAL MOUSE'
    # bindcode --release 64 exec --no-startup-id xinput --enable  'USB OPTICAL MOUSE'
    # bindcode 118 exec --no-startup-id sleep 0.1 && xdotool key --delay 100 space Ctrl+Left space
    $i3
    bindcode 118 exec --no-startup-id ~/Documents/python/tools/pswitcher.py
    bindsym --whole-window button8 exec --no-startup-id xdotool key Next
    bindsym --whole-window button9 exec --no-startup-id xdotool key Prior

  insert_after:
    "        status_command i3status\n": |
      colors {
        background         #00000000
        focused_workspace  #4c566a #4c566a #d8dee9
        inactive_workspace #00000000 #00000000 #d8dee9
        statusline         #d8dee9
      }
      i3bar_command i3bar --transparency
      position top
      tray_output none

  replace_old: |
    bindsym $mod+Return exec i3-sensible-terminal
    bindsym $mod+Shift+e exec "i3-nagbar -t warning -m 'You pressed the exit shortcut. Do you really want to exit i3? This will end your X session.' -B 'Yes, exit i3' 'i3-msg exit'"
    bindsym $mod+Shift+q kill
    status_command i3status

    bindsym $mod+a focus parent
    bindsym $mod+d exec --no-startup-id dmenu_run
    bindsym XF86AudioLowerVolume exec --no-startup-id pactl set-sink-volume @DEFAULT_SINK@ -10% && $refresh_i3status
    bindsym XF86AudioMicMute exec --no-startup-id pactl set-source-mute @DEFAULT_SOURCE@ toggle && $refresh_i3status
    bindsym XF86AudioMute exec --no-startup-id pactl set-sink-mute @DEFAULT_SINK@ toggle && $refresh_i3status
    bindsym XF86AudioRaiseVolume exec --no-startup-id pactl set-sink-volume @DEFAULT_SINK@ +10% && $refresh_i3status
    exec --no-startup-id nm-applet

  replace_new: |
    bindsym $mod+Return exec xfce4-terminal -e ranger
    bindsym $mod+Shift+e exec i3-msg exit
    bindsym Ctrl+q kill
    status_command while ~/Documents/enterprise/scripts/status_command.sh; do sleep 1; done

