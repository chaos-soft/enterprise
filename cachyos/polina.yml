/mnt/larka/games/tmp/vkBasalt.conf:
  replace_old: toggleKey = Home
  replace_new: toggleKey = F7

variables:
  $cursor: Breeze_Contrast

  $i3: |
    bindsym $mod+Next            workspace next
    bindsym $mod+Prior           workspace prev
    bindsym $mod+a               exec --no-startup-id OBS_VKCAPTURE=1 ~/tmp/ariel/ariel.x86_64
    bindsym Control+Tab          focus right
    bindsym Ctrl+1               exec --no-startup-id ~/Documents/enterprise/cachyos/rofi.py
    bindsym Ctrl+2               exec --no-startup-id rofi -show drun -disable-history -matching prefix
    bindsym Ctrl+3               exec --no-startup-id ~/Documents/enterprise/scripts/rofi_ds3.py
    bindsym Ctrl+F10             exec --no-startup-id amixer -q set Capture toggle && $refresh_i3status
    bindsym F10                  exec --no-startup-id amixer -q set Master toggle && $refresh_i3status
    bindsym Print                exec --no-startup-id xfce4-screenshooter -f -s ~/Pictures/$(date +%Y%m%d-%H%M%S).png
    bindsym XF86AudioLowerVolume exec --no-startup-id wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && $refresh_i3status
    bindsym XF86AudioMute        exec --no-startup-id amixer -q set Master toggle && $refresh_i3status
    bindsym XF86AudioRaiseVolume exec --no-startup-id wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ && $refresh_i3status
    client.focused          #4c566a #4c566a #d8dee9 #ff0000 #000000
    client.focused_inactive #000000a8 #000000a8 #d8dee9 #ff0000 #000000
    client.unfocused        #000000a8 #000000a8 #d8dee9 #ff0000 #000000
    exec --no-startup-id ~/Documents/enterprise/cachyos/autostart.sh
    font pango:Sans 14px
    for_window [class="^.*"] border pixel 0
    for_window [class="^.*"] title_format " %title"
    for_window [class="ariel"] floating enable
    for_window [title="Authentication required"] floating enable
    for_window [title="Disks"] floating enable
    for_window [title="galculator"] floating enable
    gaps left 4
    hide_edge_borders both
    workspace_layout tabbed

  $qt6ct: |
    [Appearance]
    color_scheme_path=/usr/share/qt6ct/colors/darker.conf
    custom_palette=true
    standard_dialogs=gtk3
    style=Fusion

    [Interface]
    dialog_buttons_have_icons=0
    menus_have_icons=false
    underline_shortcut=0
